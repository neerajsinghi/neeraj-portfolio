name: Bootstrap — Store secrets in AWS SSM Parameter Store

# Run this ONCE (or whenever you rotate secrets) to populate SSM.
# GitHub Actions secrets are used as the source of truth for key material;
# SSM Parameter Store is the runtime source for EKS pods.
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   ANTHROPIC_API_KEY, OPENAI_API_KEY, XAI_API_KEY, GEMINI_API_KEY,
#   ALLOWED_ORIGIN, AWS_ROLE_ARN
#
# Required GitHub variables (Settings → Variables → Actions):
#   AWS_REGION

on:
  workflow_dispatch:
    inputs:
      overwrite:
        description: "Overwrite existing SSM parameters?"
        type: boolean
        default: true

env:
  SSM_PREFIX: /neeraj-portfolio

jobs:
  bootstrap:
    name: Push secrets to SSM
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # OIDC
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Write parameters to SSM
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY:       ${{ secrets.XAI_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          ALLOWED_ORIGIN:    ${{ secrets.ALLOWED_ORIGIN }}
          OVERWRITE:         ${{ inputs.overwrite }}
        run: |
          set -euo pipefail

          put() {
            local name="$1"
            local value="$2"
            local overwrite_flag=""
            [ "$OVERWRITE" = "true" ] && overwrite_flag="--overwrite"

            aws ssm put-parameter \
              --name "$SSM_PREFIX/$name" \
              --value "$value" \
              --type SecureString \
              $overwrite_flag \
              --no-cli-pager \
              2>&1 | grep -v "already exists" || true

            echo "  ✓ $SSM_PREFIX/$name"
          }

          echo "Writing parameters to SSM (region: ${{ vars.AWS_REGION }})..."
          put "anthropic-api-key" "$ANTHROPIC_API_KEY"
          put "openai-api-key"    "$OPENAI_API_KEY"
          put "xai-api-key"       "$XAI_API_KEY"
          put "gemini-api-key"    "$GEMINI_API_KEY"
          put "allowed-origin"    "$ALLOWED_ORIGIN"
          echo "Done."

      - name: Verify parameters exist (values masked)
        run: |
          aws ssm get-parameters-by-path \
            --path "$SSM_PREFIX" \
            --with-decryption \
            --query 'Parameters[].{Name:Name,Version:Version,LastModified:LastModifiedDate}' \
            --output table \
            --no-cli-pager
