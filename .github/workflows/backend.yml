name: Backend — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

env:
  ECR_REPOSITORY:  neeraj-portfolio-backend
  K8S_DEPLOYMENT:  neeraj-portfolio-backend
  K8S_NAMESPACE:   portfolio
  K8S_CONTAINER:   backend
  EKS_CLUSTER:     neeraj-portfolio

jobs:
  # ── 1. Build & vet (runs on every push and PR) ────────────────────────────
  build:
    name: Build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build
        working-directory: backend
        run: go build ./...

      - name: Vet
        working-directory: backend
        run: go vet ./...

  # ── 2. Push to ECR & deploy to EKS (main branch only) ────────────────────
  deploy:
    name: Push to ECR & deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push Docker image
        id: build
        env:
          REGISTRY:  ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE=$REGISTRY/$ECR_REPOSITORY
          docker build -t $IMAGE:$IMAGE_TAG -t $IMAGE:latest backend/
          docker push $IMAGE:$IMAGE_TAG
          docker push $IMAGE:latest
          echo "image=$IMAGE:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name $EKS_CLUSTER \
            --region ${{ vars.AWS_REGION }}

      - name: Sync SSM secrets → K8s secret
        run: |
          # Pull SecureString values from SSM and upsert the K8s secret.
          # Using dry-run + apply makes this idempotent (create or update).
          get() {
            aws ssm get-parameter \
              --name "/neeraj-portfolio/$1" \
              --with-decryption \
              --query 'Parameter.Value' \
              --output text
          }

          kubectl create secret generic portfolio-secrets \
            --namespace "$K8S_NAMESPACE" \
            --from-literal=anthropic-api-key="$(get anthropic-api-key)" \
            --from-literal=allowed-origin="$(get allowed-origin)" \
            --save-config \
            --dry-run=client -o yaml \
          | kubectl apply -f -

      - name: Apply namespace & service (idempotent)
        run: |
          kubectl apply -f backend/k8s/namespace.yaml
          kubectl apply -f backend/k8s/service.yaml
          kubectl apply -f backend/k8s/hpa.yaml

      - name: Roll out new image
        run: |
          kubectl set image deployment/$K8S_DEPLOYMENT \
            $K8S_CONTAINER=${{ steps.build.outputs.image }} \
            -n $K8S_NAMESPACE
          kubectl rollout status deployment/$K8S_DEPLOYMENT \
            -n $K8S_NAMESPACE --timeout=120s
