name: Frontend — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"

env:
  AMPLIFY_BRANCH: main

jobs:
  # ── 1. Type-check & build (runs on every push and PR) ─────────────────────
  check:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: ./node_modules/.bin/tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  # ── 2. Trigger Amplify deployment (main branch only) ──────────────────────
  deploy:
    name: Deploy to Amplify
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Start Amplify deployment
        id: start
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name $AMPLIFY_BRANCH \
            --job-type RELEASE \
            --query 'jobSummary.jobId' \
            --output text)
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "Amplify job started: $JOB_ID"

      - name: Wait for deployment to complete
        run: |
          APP_ID=${{ secrets.AMPLIFY_APP_ID }}
          JOB_ID=${{ steps.start.outputs.job_id }}
          TIMEOUT=600   # 10 minutes
          ELAPSED=0
          INTERVAL=15

          while true; do
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$JOB_ID" \
              --query 'job.summary.status' \
              --output text)

            echo "[$ELAPSED s] Amplify status: $STATUS"

            case "$STATUS" in
              SUCCEED)
                echo "Deployment succeeded."
                exit 0
                ;;
              FAILED|CANCELLED)
                echo "Deployment $STATUS."
                exit 1
                ;;
            esac

            ELAPSED=$((ELAPSED + INTERVAL))
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "Timed out waiting for Amplify deployment."
              exit 1
            fi
            sleep $INTERVAL
          done
