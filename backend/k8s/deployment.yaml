apiVersion: apps/v1
kind: Deployment
metadata:
  name: neeraj-portfolio-backend
  namespace: portfolio
  labels:
    app: neeraj-portfolio-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neeraj-portfolio-backend
  template:
    metadata:
      labels:
        app: neeraj-portfolio-backend
    spec:
      containers:
        - name: backend
          # Replaced by CI/CD: kubectl set image deployment/... backend=<ECR_URL>:<SHA>
          image: PLACEHOLDER_ECR_IMAGE
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: anthropic-api-key
            - name: ALLOWED_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: allowed-origin
            - name: GITHUB_USER
              value: neerajsinghi
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
      terminationGracePeriodSeconds: 30
